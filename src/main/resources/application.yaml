spring:
  application:
    name: storm-imdb-graalvm
  autoconfigure:
    # This application uses Storm's coroutine-native suspend transaction { }
    # blocks exclusively. Suspend mode is incompatible with Spring-managed
    # Storm transactions, so the Spring transaction integration is disabled;
    # Storm manages transactions directly on the DataSource.
    exclude:
      - st.orm.spring.boot.StormTransactionAutoConfiguration
  datasource:
    # Note: reWriteBatchedInserts is intentionally NOT enabled — it breaks
    # the per-row affected counts that Storm verifies after batch writes.
    url: jdbc:postgresql://localhost:5432/imdb
    username: storm
    password: storm
  threads:
    virtual:
      enabled: true

imdb:
  import:
    cache-directory: ./data
    minimum-vote-count: 1000

# Storm reports every query (storm.query) and every transaction (storm.transaction) as
# Micrometer Observations once an ObservationRegistry is present; Actuator provides one.
# Inspect the timers at /actuator/metrics/storm.query and /actuator/metrics/storm.transaction.
management:
  endpoints:
    web:
      exposure:
        include: health,metrics

# Query observations report the OpenTelemetry database semantic conventions, so the
# spans surface in the database views of OTLP-capable backends. The trace context also
# rides along as a sqlcommenter-style comment on every statement (opt-in: a per-execution
# comment defeats prepared statement caching), correlating PostgreSQL's own diagnostics
# (pg_stat_activity, slow logs) back to the trace.
storm:
  observations:
    semantic-conventions: otel
  tracing:
    sql-comments: true
